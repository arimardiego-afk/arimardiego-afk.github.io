*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;background:var(--htmlbg);-webkit-text-size-adjust:100%;text-size-adjust:100%;overflow-x:clip}
body{font-family:var(--font-b);background:var(--bg);color:var(--txt);line-height:1.6;font-size:17px}
body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(1100px 560px at 82% -10%,var(--glow1),transparent 60%),
             radial-gradient(820px 460px at -8% 18%,var(--glow2),transparent 55%);}
.wrap{max-width:820px;margin:0 auto;padding:0 20px;position:relative;z-index:1}
h1,h2,h3,.brand{font-family:var(--font-h)}
a{color:var(--acc);text-decoration:none}
nav{position:sticky;top:0;z-index:50;backdrop-filter:blur(10px);background:var(--nav);border-bottom:1px solid var(--brd2)}
.nav-in{display:flex;align-items:center;gap:10px 14px;min-height:60px;flex-wrap:wrap;padding:8px 0}
.brand{font-weight:900;font-size:15px;letter-spacing:.5px;color:var(--txt);display:flex;align-items:center;gap:8px}
.brand .dot{width:11px;height:11px;border-radius:50%;background:var(--acc);box-shadow:0 0 12px var(--acc)}
.nav-links{margin-left:auto;display:flex;gap:8px 16px;align-items:center;flex-wrap:wrap}
.nav-links a{color:var(--txt2);font-size:14px;font-weight:600;transition:color .2s}
.nav-links a:hover,.nav-links a.here{color:var(--acc)}
@media(max-width:720px){ .nav-links{gap:6px 12px;width:100%} .nav-links a{font-size:13px} .brand{font-size:13px} }
.themes{display:flex;gap:6px;align-items:center}
.sw{width:20px;height:20px;border-radius:50%;border:1px solid var(--brd2);cursor:pointer;padding:0;position:relative}
.sw.on{box-shadow:0 0 0 2px var(--acc)}
.lang{display:flex;gap:2px;border:1px solid var(--brd);border-radius:20px;overflow:hidden}
.lang button{background:none;border:none;color:var(--txt2);padding:5px 10px;font-family:var(--font-h);font-size:11px;font-weight:700;cursor:pointer}
.lang button.on{background:var(--acc);color:var(--btxt)}
header.top{padding:46px 0 20px}
header.top h1{font-size:clamp(26px,5vw,40px);font-weight:800;margin-bottom:12px}
header.top p.lead{color:var(--txt2);font-size:18px;max-width:640px}
.man{padding:14px 0 70px}
.sec{background:linear-gradient(180deg,var(--card),var(--bg2));border:1px solid var(--brd);border-radius:12px;margin-bottom:12px;overflow:hidden}
.sec>summary{padding:16px 18px;cursor:pointer;font-family:var(--font-h);font-weight:700;font-size:15px;color:var(--txt);list-style:none;display:flex;align-items:center;gap:12px}
.sec>summary::-webkit-details-marker{display:none}
.sec>summary .n{min-width:30px;height:30px;border-radius:8px;background:rgba(127,127,127,.12);border:1px solid var(--brd);color:var(--acc);display:flex;align-items:center;justify-content:center;font-size:13px}
.sec>summary::after{content:"+";margin-left:auto;color:var(--acc);font-size:20px}
.sec[open]>summary::after{content:"−"}
.sec .body{padding:2px 20px 18px 62px}
.sec .body p{margin:10px 0;color:var(--txt2)}
.sec .body b{color:var(--txt)}
.sec .body ul,.sec .body ol{margin:10px 0 10px 20px;color:var(--txt2)}
.sec .body li{margin:6px 0}
.sec .body code{background:rgba(127,127,127,.14);padding:1px 6px;border-radius:5px;font-size:14px;color:var(--acc)}
.extra{background:linear-gradient(180deg,var(--card2),var(--bg2));border:1px solid var(--acc);border-radius:14px;padding:22px 24px;margin:26px 0 8px}
.extra h2{font-size:20px;margin-bottom:6px}
.extra ul{margin:12px 0 0 18px}.extra li{margin:8px 0;color:var(--txt2)}.extra b{color:var(--txt)}
.extra code{background:rgba(127,127,127,.14);padding:1px 6px;border-radius:5px;font-size:14px;color:var(--acc)}
footer{border-top:1px solid var(--brd2);padding:26px 0 50px;color:var(--txt3);font-size:14px;text-align:center}
@media(max-width:560px){ .sec .body{padding-left:20px} .brand{font-size:12px} }

<script>
const DATA={"pt":[{"ic":"ti-book-2","t":"Visão geral","c":"<p>O <b>Organizador de Aulas</b> organiza suas aulas em vídeo em 5 níveis, do geral para o específico:</p>\n\n<p>Exemplo: <b>HISTÓRIA</b> → <b>2° ano EM</b> → <b>Aula 12 (Revolução Francesa)</b> → <b>Cap. 01</b> → <b>vídeo do YouTube</b>.</p>\n<p>Tudo funciona <b>sem internet</b> e é salvo automaticamente no aparelho a cada alteração.</p>"},{"ic":"ti-menu-2","t":"O menu ☰","c":"<p>O botão <b>☰</b> (canto superior esquerdo da tela inicial) abre o <b>menu</b> — é por ele que se começa a usar o app. Lá dentro estão:</p>\n<ul>\n<li><b>Projeto em uso</b> e a lista de troca rápida (até 7 anos letivos).</li>\n<li><b>Arquivo:</b> criar e gerenciar projetos, e exportar/importar o <b>backup (.json)</b>.</li>\n<li><b>Ativar / Comprar:</b> ativar a versão completa (na cópia adquirida pelo site).</li>\n<li><b>Ajuda:</b> Tutorial, <b>Modo demonstração</b>, Idioma, Privacidade, Termos de uso, Atualização e Versão.</li>\n</ul>\n<p>Para fechar o menu, toque na área escura ao lado ou no <b>✕</b>.</p>"},{"ic":"ti-archive","t":"Projetos — anos letivos","c":"<p>Cada <b>projeto</b> guarda um ano letivo completo (Ano + Instituição), com todas as matérias, aulas e documentos.</p>\n\n<ul>\n<li><b>Criar:</b> menu ☰ → <b>Criar novo projeto</b> → preencha <b>Ano</b> e <b>Instituição</b>. O projeto novo começa vazio e vira o projeto em uso.</li>\n<li><b>Arquivar:</b> nada se perde — o ano anterior fica guardado na lista de projetos.</li>\n<li><b>Trocar:</b> toque na barra do ano letivo (na tela inicial) ou em ☰ → <b>Gerenciar projetos</b> e escolha o projeto.</li>\n<li><b>Guardar fora do aparelho:</b> use <b>Exportar backup</b> (seção Backup, mais abaixo).</li>\n</ul>"},{"ic":"ti-books","t":"Matérias e séries","c":"<p>A tela inicial lista as <b>matérias</b>. Dentro de uma matéria ficam as <b>séries/anos</b> (ex.: 1°, 2° e 3° ano).</p>\n<ul>\n<li><b>Nova matéria:</b> botão grande no rodapé da tela inicial.</li>\n<li><b>Nova série:</b> abra a matéria e toque em <b>Nova série/ano</b>.</li>\n<li>Na série, o botão com a <b>setinha (nº de aulas)</b> abre a árvore resumida das aulas.</li>\n<li><b>Horas de cada série:</b> o cartão mostra três indicadores — <b>Horas totais</b> (soma da duração de todos os vídeos), <b>Ministradas</b> (capítulos já marcados como dados) e <b>Não ministradas</b> (o que ainda falta). Eles se atualizam sozinhos conforme você marca os capítulos.</li>\n<li>O ícone de <b>relatório</b> na série gera um documento Word/PDF com toda a estrutura.</li>\n<li>Os ícones de <b>lápis</b> e <b>lixeira</b> editam e removem cada item.</li>\n</ul>"},{"ic":"ti-player-play","t":"Aulas e capítulos","c":"<p>Dentro da série ficam as <b>aulas</b> (numeradas automaticamente) e, dentro de cada aula, os <b>capítulos</b>.</p>\n\n<ul>\n<li>A <b>caixinha</b> do capítulo controla a pendência: marcada = ainda falta dar essa aula; vazia = já ministrada. Os contadores “● a ministrar” sobem para aula, série e matéria.</li>\n<li>Os <b>chips CP1…CP11</b> acendem quando o capítulo tem conteúdo; tocar num chip aceso rola até o capítulo.</li>\n<li><b>Observações:</b> cada capítulo tem uma janelinha “Observações” (recolhida por padrão) para anotações livres — lembretes, tarefas, páginas do livro. O ponto ● indica que há texto salvo.</li>\n</ul>"},{"ic":"ti-video-off","t":"Vídeos","c":"<p>Dentro do capítulo, toque em <b>Adicionar vídeo</b>. No formulário você pode:</p>\n<ul>\n<li><b>Nome</b> do vídeo (obrigatório).</li>\n<li><b>Link do YouTube:</b> ao colar, o app preenche sozinho o <b>nome do vídeo</b> e a <b>duração</b> (precisa de internet só nessa hora). Sem link, o botão de lupa procura o vídeo pelo nome no YouTube.</li>\n<li><b>Duração</b> no campo pequeno ao lado do link (MM:SS ou H:MM:SS) — se não for detectada sozinha, preencha à mão; ela alimenta os totais de aula, série e matéria.</li>\n<li><b>Resumo</b> de até ≈3 páginas — é você quem escreve ou cola o texto no campo (o app não cria o resumo automaticamente). Fica numa seção recolhida abaixo do botão de busca; toque nela para abrir. Exporta em <b>Word (.doc)</b> ou <b>PDF</b>.</li>\n<li><b>Rascunho automático:</b> o que você digita neste formulário é guardado sozinho; se o app fechar sem salvar, ele oferece restaurar tudo na próxima abertura.</li>\n</ul>\n<p>Na lista, o <b>▶</b> abre o link do vídeo e os ícones ao lado do tempo mostram se há resumo, materiais ou documentos anexados.</p>"},{"ic":"ti-paperclip","t":"Material didático e documentos","c":"<p>No formulário do vídeo, a seção <b>“Material didático e documentos”</b> fica recolhida — toque nela para expandir.</p>\n\n<ul>\n<li><b>Materiais citados:</b> lista simples com o <b>título</b> do livro citado no vídeo. A <b>lupa</b> ao lado de cada material procura na internet uma versão <b>gratuita em PDF</b> do livro.</li>\n<li><b>Documentos anexados:</b> toque em <b>Importar PDF, imagem, Word ou áudio</b> para guardar até <b>10 arquivos por vídeo</b> (até <b>100 MB</b> cada — cabe um livro inteiro) dentro do próprio app.</li>\n<li>Cada documento tem um <b>Título</b> editável, além de <b>miniatura</b> (fotos) ou <b>selo colorido</b> (PDF, DOC, áudio) para reconhecer o tipo de longe.</li>\n<li>O <b>olhinho</b> abre PDFs e imagens na hora; arquivos Word são baixados para abrir no editor do aparelho. Se um PDF não abrir, teste outro documento — alguns arquivos já vêm com defeito de origem.</li>\n<li>O botão de <b>compartilhar</b> envia o documento por <b>WhatsApp</b>, e-mail ou qualquer outro app do aparelho.</li>\n<li>Os anexos entram no backup do projeto e saem nos relatórios.</li>\n</ul>"},{"ic":"ti-palette","t":"Temas","c":"<p>O botão no canto superior direito alterna entre os 5 temas — a preferência fica salva:</p>\n<ol>\n<li><b>Claro</b> — fundo bege, vermelho terracota.</li>\n<li><b>Escuro</b> — preto OLED com néon branco.</li>\n<li><b>Prometeu</b> — HUD sci-fi ciano (assinatura do app).</li>\n<li><b>P. Vermelho</b> e <b>P. Azul</b> — variações do Prometeu.</li>\n</ol>"},{"ic":"ti-eye","t":"Letras maiores e zoom","c":"<p>Para quem prefere letras e botões maiores:</p>\n<ul>\n<li><b>☰ → Tamanho do texto:</b> toque em <b>A+</b> para aumentar as letras e os botões do app inteiro (até 150%) e em <b>A−</b> para voltar. A escolha fica salva.</li>\n<li><b>Zoom de pinça:</b> em celulares e tablets, você também pode ampliar qualquer tela afastando dois dedos sobre ela (movimento de pinça).</li>\n</ul>"},{"ic":"ti-report","t":"Relatórios e exportações","c":"<ul>\n<li><b>Relatório da série:</b> ícone de relatório no cartão da série → Word ou PDF com aulas, capítulos, vídeos, links, observações, pendências e documentos.</li>\n<li><b>Resumo do vídeo:</b> dentro do formulário do vídeo → Word ou PDF com o texto do resumo, material didático e anexos.</li>\n<li>Para PDF, o navegador abre a tela de impressão: escolha <b>“Salvar como PDF”</b>.</li>\n</ul>"},{"ic":"ti-shield","t":"Backup e segurança dos dados","c":"<p><b>O salvamento é automático.</b> Tudo o que você digita é guardado sozinho, a cada alteração, <b>no navegador deste aparelho</b> — não existe botão “salvar”, e nada é enviado para a internet. Se o app for desinstalado ou os dados do navegador forem limpos, porém, eles se vão. Por isso, para <b>trocar de aparelho</b> ou ter uma cópia de segurança, exporte um backup:</p>\n<ul>\n<li><b>Exportar:</b> ☰ → Arquivo → <b>Exportar backup (.json)</b> — gera um arquivo com o projeto inteiro, anexos incluídos.</li>\n<li><b>Nome do arquivo:</b> <code>prometeu-&lt;ano&gt;.json</code> (por exemplo, <b>prometeu-2026.json</b>; se o projeto tiver instituição, ela entra no nome). É esse arquivo que você leva para outro aparelho.</li>\n<li><b>Onde ele fica:</b> na <b>pasta de Downloads</b> do aparelho — no <b>Windows</b>, “Downloads” (ou “Transferências”); no <b>Android</b>, “Download”; no <b>iPhone/iPad</b>, app <b>Arquivos</b> → “Transferências/Downloads”. Copie-o para o Google Drive, e-mail ou pen-drive para não perder.</li>\n<li><b>Importar:</b> ☰ → Arquivo → <b>Importar backup (.json)</b> — no aparelho novo, escolha esse arquivo e o projeto inteiro é recriado.</li>\n<li>Sugestão: exporte ao fim de cada bimestre e antes de atualizar o app.</li>\n</ul>"},{"ic":"ti-device-tablet","t":"No tablet Samsung (Galaxy Tab S)","c":"<p>O app foi ajustado para tablets — tela cheia, <b>tela dividida</b> e <b>exibição pop-up</b> do One UI:</p>\n\n<ul>\n<li><b>Instalar no celular/tablet Android:</b> abra o site no Chrome → menu ⋮ → <b>“Instalar aplicativo”</b> (ou “Adicionar à tela inicial”). O app passa a abrir em janela própria, sem barra do navegador.</li>\n<li><b>Instalar no iPhone/iPad:</b> abra o site no <b>Safari</b> → botão <b>Compartilhar</b> (quadrado com seta) → <b>“Adicionar à Tela de Início”</b>.</li>\n<li><b>Instalar no computador (Windows):</b> abra o site no <b>Edge ou Chrome</b> e clique no <b>ícone de instalação</b> que aparece na barra de endereço — o app vira um programa com ícone no menu Iniciar.</li>\n<li><b>Tela dividida:</b> toque em <b>Recentes</b> (botão ▯|▯ ou gesto), toque no <b>ícone do app</b> no topo do cartão → <b>“Abrir em visualização em tela dividida”</b> → escolha o segundo app (ex.: YouTube). A divisória central ajusta o tamanho.</li>\n<li><b>Exibição pop-up:</b> em Recentes, toque no ícone do app → <b>“Abrir em exibição pop-up”</b> — o app vira uma janelinha flutuante sobre outro app.</li>\n<li>O layout se reorganiza sozinho em qualquer tamanho de janela. Nas Observações, a conversão de escrita à mão da caneta fica desativada (use o teclado) para evitar erros.</li>\n</ul>"},{"ic":"ti-help","t":"Atualização e versão","c":"<ul>\n<li><b>☰ → Ajuda → Atualização:</b> explica como atualizar cada versão (PWA ou arquivo único) e verifica se há versão nova.</li>\n<li><b>☰ → Ajuda → Versão:</b> mostra a versão instalada e um resumo dos dados guardados.</li>\n</ul>"}],"en":[{"ic":"ti-book-2","t":"Overview","c":"<p>The <b>Lesson Organizer</b> arranges your video lessons in 5 levels, from general to specific:</p>\n\n<p>Example: <b>HISTORY</b> → <b>11th grade</b> → <b>Lesson 12 (French Revolution)</b> → <b>Chap. 01</b> → <b>YouTube video</b>.</p>\n<p>Everything works <b>without internet</b> and is saved automatically on the device after every change.</p>"},{"ic":"ti-menu-2","t":"The ☰ menu","c":"<p>The <b>☰</b> button (top-left of the home screen) opens the <b>menu</b> — the app's starting point. Inside you'll find:</p>\n<ul>\n<li><b>Current project</b> and the quick-switch list (up to 7 school years).</li>\n<li><b>File:</b> create and manage projects, and export/import the <b>backup (.json)</b>.</li>\n<li><b>Activate / Buy:</b> unlock the full version (in the copy bought from the website).</li>\n<li><b>Help:</b> Tutorial, <b>Demo mode</b>, Language, Privacy, Terms of use, Updates and Version.</li>\n</ul>\n<p>To close the menu, tap the dark area beside it or the <b>✕</b>.</p>"},{"ic":"ti-archive","t":"Projects — school years","c":"<p>Each <b>project</b> holds a full school year (Year + Institution), with all subjects, lessons and documents.</p>\n\n<ul>\n<li><b>Create:</b> menu ☰ → <b>Create new project</b> → fill in <b>Year</b> and <b>Institution</b>. The new project starts empty and becomes the current one.</li>\n<li><b>Archive:</b> nothing is lost — the previous year stays in the project list.</li>\n<li><b>Switch:</b> tap the school-year bar (home screen) or ☰ → <b>Manage projects</b> and pick a project.</li>\n<li><b>Keep a copy off the device:</b> use <b>Export backup</b> (Backup section below).</li>\n</ul>"},{"ic":"ti-books","t":"Subjects and grades","c":"<p>The home screen lists your <b>subjects</b>. Inside a subject live the <b>grades/years</b> (e.g. 10th, 11th and 12th grade).</p>\n<ul>\n<li><b>New subject:</b> big button at the bottom of the home screen.</li>\n<li><b>New grade:</b> open the subject and tap <b>New grade/year</b>.</li>\n<li>In the grade card, the <b>arrow button (lesson count)</b> opens a compact tree of the lessons.</li>\n<li><b>Hours per grade:</b> the card shows three indicators — <b>Total hours</b> (sum of all video durations), <b>Taught</b> (chapters already marked as done) and <b>Not taught</b> (what's still left). They update automatically as you check off chapters.</li>\n<li>The <b>report</b> icon on the grade generates a Word/PDF document with the whole structure.</li>\n<li>The <b>pencil</b> and <b>trash</b> icons edit and delete each item.</li>\n</ul>"},{"ic":"ti-player-play","t":"Lessons and chapters","c":"<p>Inside the grade are the <b>lessons</b> (numbered automatically) and, inside each lesson, the <b>chapters</b>.</p>\n\n<ul>\n<li>The chapter <b>checkbox</b> controls the pending state: checked = still to be taught; empty = already taught. The “● to teach” counters roll up to lesson, grade and subject.</li>\n<li>The <b>CP1…CP11 chips</b> light up when a chapter has content; tapping a lit chip scrolls to that chapter.</li>\n<li><b>Notes:</b> each chapter has a small “Notes” panel (collapsed by default) for free-form notes — reminders, tasks, book pages. The ● dot shows there is saved text.</li>\n</ul>"},{"ic":"ti-video-off","t":"Videos","c":"<p>Inside a chapter, tap <b>Add video</b>. In the form you can set:</p>\n<ul>\n<li>The video <b>name</b> (required).</li>\n<li><b>YouTube link:</b> when pasted, the app fills in the <b>video name</b> and the <b>duration</b> automatically (internet needed only at that moment). Without a link, the magnifier button searches YouTube by name.</li>\n<li><b>Duration</b> in the small field next to the link (MM:SS or H:MM:SS) — if it isn't detected automatically, fill it in by hand; it feeds the totals for lesson, grade and subject.</li>\n<li>A <b>summary</b> of up to ≈3 pages — you write or paste the text yourself (the app does not create summaries automatically). It sits in a collapsed section below the search button; tap it to open. Exportable as <b>Word (.doc)</b> or <b>PDF</b>.</li>\n<li><b>Automatic draft:</b> whatever you type in this form is saved on its own; if the app closes before you save, it offers to restore everything on the next launch.</li>\n</ul>\n<p>In the list, <b>▶</b> opens the video link, and the icons next to the time show whether there is a summary, materials or attached documents.</p>"},{"ic":"ti-paperclip","t":"Teaching materials and documents","c":"<p>In the video form, the <b>“Teaching materials & documents”</b> section starts collapsed — tap it to expand.</p>\n\n<ul>\n<li><b>Cited materials:</b> a simple list with the <b>title</b> of the book mentioned in the video. The <b>magnifier</b> next to each material searches the internet for a <b>free PDF</b> version of the book.</li>\n<li><b>Attached documents:</b> tap <b>Import PDF, image, Word or audio</b> to store up to <b>10 files per video</b> (up to <b>100 MB</b> each — enough for a whole book) inside the app itself.</li>\n<li>Each document has an editable <b>Title</b>, plus a <b>thumbnail</b> (photos) or a <b>colored badge</b> (PDF, DOC, audio) so you can spot the type at a glance.</li>\n<li>The <b>eye</b> opens PDFs and images right away; Word files are downloaded to open in the device's editor. If a PDF won't open, try another document — some files are corrupted at the source.</li>\n<li>The <b>share</b> button sends the document via <b>WhatsApp</b>, e-mail or any other app on the device.</li>\n<li>Attachments are included in project backups and in reports.</li>\n</ul>"},{"ic":"ti-palette","t":"Themes","c":"<p>The button in the top-right corner cycles through the 5 themes — the preference is saved:</p>\n<ol>\n<li><b>Light</b> — beige background, terracotta red.</li>\n<li><b>Dark</b> — OLED black with white neon.</li>\n<li><b>Prometheus</b> — cyan sci-fi HUD (the app's signature).</li>\n<li><b>P. Red</b> and <b>P. Blue</b> — Prometheus variations.</li>\n</ol>"},{"ic":"ti-eye","t":"Bigger text and zoom","c":"<p>If you prefer bigger text and buttons:</p>\n<ul>\n<li><b>☰ → Text size:</b> tap <b>A+</b> to enlarge the text and buttons of the whole app (up to 150%) and <b>A−</b> to go back. The choice is saved.</li>\n<li><b>Pinch zoom:</b> on phones and tablets you can also zoom into any screen by spreading two fingers on it (pinch gesture).</li>\n</ul>"},{"ic":"ti-report","t":"Reports and exports","c":"<ul>\n<li><b>Grade report:</b> report icon on the grade card → Word or PDF with lessons, chapters, videos, links, notes, pending items and documents.</li>\n<li><b>Video summary:</b> inside the video form → Word or PDF with the summary text, teaching materials and attachments.</li>\n<li>For PDF, the browser opens the print dialog: choose <b>“Save as PDF”</b>.</li>\n</ul>"},{"ic":"ti-shield","t":"Backup and data safety","c":"<p><b>Saving is automatic.</b> Everything you type is stored on its own, on every change, <b>in this device's browser</b> — there is no “save” button, and nothing is sent to the internet. But if the app is uninstalled or the browser data is cleared, it is gone. So, to <b>switch devices</b> or keep a safety copy, export a backup:</p>\n<ul>\n<li><b>Export:</b> ☰ → File → <b>Export backup (.json)</b> — creates a file with the whole project, attachments included.</li>\n<li><b>File name:</b> <code>prometeu-&lt;year&gt;.json</code> (for example, <b>prometeu-2026.json</b>; if the project has an institution, it's added to the name). This is the file you take to another device.</li>\n<li><b>Where it goes:</b> to the device's <b>Downloads folder</b> — on <b>Windows</b>, “Downloads”; on <b>Android</b>, “Download”; on <b>iPhone/iPad</b>, the <b>Files</b> app → “Downloads”. Copy it to Google Drive, e-mail or a USB stick so you don't lose it.</li>\n<li><b>Import:</b> ☰ → File → <b>Import backup (.json)</b> — on the new device, pick that file and the whole project is recreated.</li>\n<li>Suggestion: export at the end of each term and before updating the app.</li>\n</ul>"},{"ic":"ti-device-tablet","t":"On a Samsung tablet (Galaxy Tab S)","c":"<p>The app is tuned for tablets — full screen, One UI <b>split screen</b> and <b>pop-up view</b>:</p>\n\n<ul>\n<li><b>Install on an Android phone/tablet:</b> open the site in Chrome → ⋮ menu → <b>“Install app”</b> (or “Add to home screen”). The app then opens in its own window, without the browser bar.</li>\n<li><b>Install on iPhone/iPad:</b> open the site in <b>Safari</b> → <b>Share</b> button (square with arrow) → <b>“Add to Home Screen”</b>.</li>\n<li><b>Install on a computer (Windows):</b> open the site in <b>Edge or Chrome</b> and click the <b>install icon</b> in the address bar — the app becomes a program with an icon in the Start menu.</li>\n<li><b>Split screen:</b> tap <b>Recents</b>, tap the <b>app icon</b> at the top of the card → <b>“Open in split screen view”</b> → choose the second app (e.g. YouTube). The middle divider adjusts the size.</li>\n<li><b>Pop-up view:</b> in Recents, tap the app icon → <b>“Open in pop-up view”</b> — the app becomes a floating window over another app.</li>\n<li>The layout reorganizes itself at any window size. In the Notes field, stylus handwriting-to-text is disabled (use the keyboard) to avoid conversion errors.</li>\n</ul>"},{"ic":"ti-help","t":"Updates and version","c":"<ul>\n<li><b>☰ → Help → Updates:</b> explains how to update each version (PWA or single file) and checks whether a new version exists.</li>\n<li><b>☰ → Help → Version:</b> shows the installed version and a summary of the stored data.</li>\n</ul>"}],"es":[{"ic":"ti-book-2","t":"Visión general","c":"<p>El <b>Organizador de Clases</b> organiza tus clases en vídeo en 5 niveles, de lo general a lo específico:</p>\n\n<p>Ejemplo: <b>HISTORIA</b> → <b>2.º de bachillerato</b> → <b>Clase 12 (Revolución Francesa)</b> → <b>Cap. 01</b> → <b>vídeo de YouTube</b>.</p>\n<p>Todo funciona <b>sin internet</b> y se guarda automáticamente en el dispositivo con cada cambio.</p>"},{"ic":"ti-menu-2","t":"El menú ☰","c":"<p>El botón <b>☰</b> (arriba a la izquierda de la pantalla inicial) abre el <b>menú</b> — el punto de partida de la app. Dentro encontrarás:</p>\n<ul>\n<li><b>Proyecto en uso</b> y la lista de cambio rápido (hasta 7 años lectivos).</li>\n<li><b>Archivo:</b> crear y gestionar proyectos, y exportar/importar la <b>copia (.json)</b>.</li>\n<li><b>Activar / Comprar:</b> desbloquear la versión completa (en la copia adquirida desde el sitio web).</li>\n<li><b>Ayuda:</b> Tutorial, <b>Modo demostración</b>, Idioma, Privacidad, Términos de uso, Actualización y Versión.</li>\n</ul>\n<p>Para cerrar el menú, toca el área oscura al lado o la <b>✕</b>.</p>"},{"ic":"ti-archive","t":"Proyectos — años lectivos","c":"<p>Cada <b>proyecto</b> guarda un año lectivo completo (Año + Institución), con todas las asignaturas, clases y documentos.</p>\n\n<ul>\n<li><b>Crear:</b> menú ☰ → <b>Crear nuevo proyecto</b> → rellena <b>Año</b> e <b>Institución</b>. El proyecto nuevo empieza vacío y pasa a ser el actual.</li>\n<li><b>Archivar:</b> no se pierde nada — el año anterior queda guardado en la lista de proyectos.</li>\n<li><b>Cambiar:</b> toca la barra del año lectivo (pantalla inicial) o ☰ → <b>Gestionar proyectos</b> y elige el proyecto.</li>\n<li><b>Guardar fuera del dispositivo:</b> usa <b>Exportar copia de seguridad</b> (sección más abajo).</li>\n</ul>"},{"ic":"ti-books","t":"Asignaturas y cursos","c":"<p>La pantalla inicial lista las <b>asignaturas</b>. Dentro de cada asignatura viven los <b>cursos/años</b> (p. ej. 1.º, 2.º y 3.º).</p>\n<ul>\n<li><b>Nueva asignatura:</b> botón grande al pie de la pantalla inicial.</li>\n<li><b>Nuevo curso:</b> abre la asignatura y toca <b>Nuevo curso/año</b>.</li>\n<li>En el curso, el botón con la <b>flecha (n.º de clases)</b> abre el árbol resumido de las clases.</li>\n<li><b>Horas de cada curso:</b> la tarjeta muestra tres indicadores — <b>Horas totales</b> (suma de la duración de todos los vídeos), <b>Impartidas</b> (capítulos ya marcados como dados) y <b>No impartidas</b> (lo que aún falta). Se actualizan solos a medida que marcas los capítulos.</li>\n<li>El icono de <b>informe</b> del curso genera un documento Word/PDF con toda la estructura.</li>\n<li>Los iconos de <b>lápiz</b> y <b>papelera</b> editan y eliminan cada elemento.</li>\n</ul>"},{"ic":"ti-player-play","t":"Clases y capítulos","c":"<p>Dentro del curso están las <b>clases</b> (numeradas automáticamente) y, dentro de cada clase, los <b>capítulos</b>.</p>\n\n<ul>\n<li>La <b>casilla</b> del capítulo controla lo pendiente: marcada = aún falta impartirlo; vacía = ya impartido. Los contadores “● por impartir” suben a clase, curso y asignatura.</li>\n<li>Los <b>chips CP1…CP11</b> se encienden cuando el capítulo tiene contenido; tocar un chip encendido desplaza hasta ese capítulo.</li>\n<li><b>Notas:</b> cada capítulo tiene un panel “Notas” (plegado por defecto) para anotaciones libres — recordatorios, tareas, páginas del libro. El punto ● indica que hay texto guardado.</li>\n</ul>"},{"ic":"ti-video-off","t":"Vídeos","c":"<p>Dentro del capítulo, toca <b>Añadir vídeo</b>. En el formulario puedes indicar:</p>\n<ul>\n<li>El <b>nombre</b> del vídeo (obligatorio).</li>\n<li><b>Enlace de YouTube:</b> al pegarlo, la app rellena sola el <b>nombre del vídeo</b> y la <b>duración</b> (internet solo en ese momento). Sin enlace, el botón de lupa busca el vídeo por nombre en YouTube.</li>\n<li><b>Duración</b> en el campo pequeño junto al enlace (MM:SS o H:MM:SS) — si no se detecta sola, rellénala a mano; alimenta los totales de clase, curso y asignatura.</li>\n<li>Un <b>resumen</b> de hasta ≈3 páginas — eres tú quien escribe o pega el texto (la app no crea el resumen automáticamente). Está en una sección plegada bajo el botón de búsqueda; tócala para abrirla. Se exporta en <b>Word (.doc)</b> o <b>PDF</b>.</li>\n<li><b>Borrador automático:</b> lo que escribes en este formulario se guarda solo; si la app se cierra sin guardar, ofrece restaurarlo todo en la próxima apertura.</li>\n</ul>\n<p>En la lista, <b>▶</b> abre el enlace del vídeo y los iconos junto al tiempo muestran si hay resumen, materiales o documentos adjuntos.</p>"},{"ic":"ti-paperclip","t":"Material didáctico y documentos","c":"<p>En el formulario del vídeo, la sección <b>«Material didáctico y documentos»</b> está plegada — tócala para expandirla.</p>\n\n<ul>\n<li><b>Materiales citados:</b> lista simple con el <b>título</b> del libro citado en el vídeo. La <b>lupa</b> junto a cada material busca en internet una versión <b>gratuita en PDF</b> del libro.</li>\n<li><b>Documentos adjuntos:</b> toca <b>Importar PDF, imagen, Word o audio</b> para guardar hasta <b>10 archivos por vídeo</b> (hasta <b>100 MB</b> cada uno — cabe un libro entero) dentro de la propia app.</li>\n<li>Cada documento tiene un <b>Título</b> editable, además de una <b>miniatura</b> (fotos) o un <b>sello de color</b> (PDF, DOC, audio) para reconocer el tipo de un vistazo.</li>\n<li>El <b>ojo</b> abre PDF e imágenes al momento; los archivos Word se descargan para abrirlos en el editor del dispositivo. Si un PDF no se abre, prueba con otro documento — algunos archivos vienen dañados de origen.</li>\n<li>El botón de <b>compartir</b> envía el documento por <b>WhatsApp</b>, correo o cualquier otra app del dispositivo.</li>\n<li>Los adjuntos entran en la copia de seguridad del proyecto y salen en los informes.</li>\n</ul>"},{"ic":"ti-palette","t":"Temas","c":"<p>El botón de la esquina superior derecha alterna entre los 5 temas — la preferencia queda guardada:</p>\n<ol>\n<li><b>Claro</b> — fondo beige, rojo terracota.</li>\n<li><b>Oscuro</b> — negro OLED con neón blanco.</li>\n<li><b>Prometeo</b> — HUD de ciencia ficción cian (la firma de la app).</li>\n<li><b>P. Rojo</b> y <b>P. Azul</b> — variaciones del Prometeo.</li>\n</ol>"},{"ic":"ti-eye","t":"Letras más grandes y zoom","c":"<p>Para quien prefiere letras y botones más grandes:</p>\n<ul>\n<li><b>☰ → Tamaño del texto:</b> toca <b>A+</b> para agrandar las letras y los botones de toda la app (hasta el 150%) y <b>A−</b> para volver. La elección queda guardada.</li>\n<li><b>Zoom de pellizco:</b> en móviles y tabletas también puedes ampliar cualquier pantalla separando dos dedos sobre ella (gesto de pellizco).</li>\n</ul>"},{"ic":"ti-report","t":"Informes y exportaciones","c":"<ul>\n<li><b>Informe del curso:</b> icono de informe en la tarjeta del curso → Word o PDF con clases, capítulos, vídeos, enlaces, notas, pendientes y documentos.</li>\n<li><b>Resumen del vídeo:</b> dentro del formulario del vídeo → Word o PDF con el texto del resumen, material didáctico y adjuntos.</li>\n<li>Para PDF, el navegador abre el diálogo de impresión: elige <b>«Guardar como PDF»</b>.</li>\n</ul>"},{"ic":"ti-shield","t":"Copia de seguridad y protección de datos","c":"<p><b>El guardado es automático.</b> Todo lo que escribes se guarda solo, en cada cambio, <b>en el navegador de este dispositivo</b> — no hay botón de “guardar” y nada se envía a internet. Pero si desinstalas la app o borras los datos del navegador, desaparecen. Por eso, para <b>cambiar de dispositivo</b> o tener una copia de seguridad, exporta una copia:</p>\n<ul>\n<li><b>Exportar:</b> ☰ → Archivo → <b>Exportar copia (.json)</b> — genera un archivo con el proyecto entero, adjuntos incluidos.</li>\n<li><b>Nombre del archivo:</b> <code>prometeu-&lt;año&gt;.json</code> (por ejemplo, <b>prometeu-2026.json</b>; si el proyecto tiene institución, se añade al nombre). Es el archivo que llevas a otro dispositivo.</li>\n<li><b>Dónde queda:</b> en la <b>carpeta de Descargas</b> del dispositivo — en <b>Windows</b>, “Descargas”; en <b>Android</b>, “Download”; en <b>iPhone/iPad</b>, la app <b>Archivos</b> → “Descargas”. Cópialo a Google Drive, correo o USB para no perderlo.</li>\n<li><b>Importar:</b> ☰ → Archivo → <b>Importar copia (.json)</b> — en el dispositivo nuevo, elige ese archivo y se recrea el proyecto entero.</li>\n<li>Sugerencia: exporta al final de cada trimestre y antes de actualizar la app.</li>\n</ul>"},{"ic":"ti-device-tablet","t":"En una tableta Samsung (Galaxy Tab S)","c":"<p>La app está ajustada para tabletas — pantalla completa, <b>pantalla dividida</b> y <b>vista emergente</b> de One UI:</p>\n\n<ul>\n<li><b>Instalar en un móvil/tablet Android:</b> abre el sitio en Chrome → menú ⋮ → <b>«Instalar aplicación»</b> (o «Añadir a pantalla de inicio»). La app pasa a abrirse en su propia ventana, sin barra del navegador.</li>\n<li><b>Instalar en iPhone/iPad:</b> abre el sitio en <b>Safari</b> → botón <b>Compartir</b> (cuadrado con flecha) → <b>«Añadir a pantalla de inicio»</b>.</li>\n<li><b>Instalar en el ordenador (Windows):</b> abre el sitio en <b>Edge o Chrome</b> y haz clic en el <b>icono de instalación</b> de la barra de direcciones — la app se convierte en un programa con icono en el menú Inicio.</li>\n<li><b>Pantalla dividida:</b> toca <b>Recientes</b>, toca el <b>icono de la app</b> en la parte superior de la tarjeta → <b>«Abrir en vista de pantalla dividida»</b> → elige la segunda app (p. ej. YouTube).</li>\n<li><b>Vista emergente:</b> en Recientes, toca el icono de la app → <b>«Abrir en vista emergente»</b> — la app se convierte en una ventana flotante sobre otra app.</li>\n<li>El diseño se reorganiza solo en cualquier tamaño de ventana. En las Notas, la escritura a mano del lápiz queda desactivada (usa el teclado) para evitar errores de conversión.</li>\n</ul>"},{"ic":"ti-help","t":"Actualización y versión","c":"<ul>\n<li><b>☰ → Ayuda → Actualización:</b> explica cómo actualizar cada versión (PWA o archivo único) y comprueba si hay una nueva.</li>\n<li><b>☰ → Ayuda → Versión:</b> muestra la versión instalada y un resumen de los datos guardados.</li>\n</ul>"}],"zh":[{"ic":"ti-book-2","t":"概览","c":"<p><b>课程管理器</b>将你的视频课程按 5 个层级组织，从整体到具体：</p>\n\n<p>示例：<b>历史</b> → <b>高二</b> → <b>第 12 课（法国大革命）</b> → <b>第 1 章</b> → <b>YouTube 视频</b>。</p>\n<p>一切<b>无需网络</b>即可使用，每次更改都会自动保存在设备上。</p>"},{"ic":"ti-menu-2","t":"☰ 菜单","c":"<p><b>☰</b> 按钮（主屏幕左上角）打开<b>菜单</b> —— 这是使用应用的起点。里面有：</p>\n<ul>\n<li><b>当前项目</b>和快速切换列表（最多 7 个学年）。</li>\n<li><b>文件：</b>新建和管理项目，导出/导入<b>备份 (.json)</b>。</li>\n<li><b>激活 / 购买：</b>解锁完整版（通过网站购买的版本）。</li>\n<li><b>帮助：</b>使用教程、<b>演示模式</b>、语言、隐私、使用条款、更新和版本。</li>\n</ul>\n<p>点按菜单旁边的深色区域或 <b>✕</b> 即可关闭。</p>"},{"ic":"ti-archive","t":"项目 — 学年","c":"<p>每个<b>项目</b>保存一个完整学年（年份 + 学校），包含全部科目、课程和文档。</p>\n\n<ul>\n<li><b>创建：</b>菜单 ☰ → <b>新建项目</b> → 填写<b>年份</b>和<b>学校</b>。新项目从空白开始并成为当前项目。</li>\n<li><b>归档：</b>不会丢失任何内容 — 上一学年保留在项目列表中。</li>\n<li><b>切换：</b>点按主屏幕的学年栏，或 ☰ → <b>管理项目</b>并选择项目。</li>\n<li><b>保存到设备之外：</b>使用<b>导出备份</b>（见下方备份部分）。</li>\n</ul>"},{"ic":"ti-books","t":"科目与年级","c":"<p>主屏幕列出<b>科目</b>。每个科目内是<b>年级</b>（如高一、高二、高三）。</p>\n<ul>\n<li><b>新科目：</b>主屏幕底部的大按钮。</li>\n<li><b>新年级：</b>打开科目后点按<b>新年级</b>。</li>\n<li>年级卡片上的<b>箭头按钮（课程数）</b>可展开课程树。</li>\n<li><b>每个年级的时长：</b>卡片显示三个指标——<b>总时长</b>（所有视频时长之和）、<b>已授课</b>（已标记为完成的章节）和<b>未授课</b>（尚未完成的部分）。勾选章节时它们会自动更新。</li>\n<li>年级上的<b>报告</b>图标可生成包含整个结构的 Word/PDF 文档。</li>\n<li><b>铅笔</b>和<b>垃圾桶</b>图标用于编辑和删除。</li>\n</ul>"},{"ic":"ti-player-play","t":"课程与章节","c":"<p>年级内是自动编号的<b>课程</b>，每节课内是<b>章节</b>。</p>\n\n<ul>\n<li>章节的<b>勾选框</b>控制待办状态：勾选 = 尚未授课；空 = 已授课。“● 待授课”计数会汇总到课程、年级和科目。</li>\n<li><b>CP1…CP11 圆片</b>在章节有内容时亮起；点按亮起的圆片可滚动到对应章节。</li>\n<li><b>备注：</b>每个章节都有一个默认收起的“备注”面板，可自由记录 — 提醒、任务、教材页码。● 圆点表示已保存文字。</li>\n</ul>"},{"ic":"ti-video-off","t":"视频","c":"<p>在章节内点按<b>添加视频</b>。在表单中可以填写：</p>\n<ul>\n<li>视频<b>名称</b>（必填）。</li>\n<li><b>YouTube 链接：</b>粘贴后应用会自动填写<b>视频名称</b>和<b>时长</b>（仅此时需要网络）。没有链接时，放大镜按钮可按名称在 YouTube 上搜索。</li>\n<li><b>时长</b>在链接旁的小输入框中（MM:SS 或 H:MM:SS）— 如未自动检测请手动填写；计入课程、年级和科目的总时长。</li>\n<li>最多约 3 页的<b>摘要</b> — 由你自己撰写或粘贴文字（应用不会自动生成摘要）。位于搜索按钮下方的收起区域，点按即可展开。可导出为 <b>Word (.doc)</b> 或 <b>PDF</b>。</li>\n<li><b>自动草稿：</b>在此表单中输入的内容会自动保存；如果应用在保存前关闭，下次打开时会提示恢复全部内容。</li>\n</ul>\n<p>在列表中，<b>▶</b> 打开视频链接；时间旁的图标显示是否有摘要、材料或附件。</p>"},{"ic":"ti-paperclip","t":"教学材料与文档","c":"<p>在视频表单中，<b>“教学材料与文档”</b>部分默认收起 — 点按即可展开。</p>\n\n<ul>\n<li><b>引用材料：</b>仅含视频中提到书籍<b>标题</b>的简单列表。每条材料旁的<b>放大镜</b>可在网上搜索该书的<b>免费 PDF</b> 版本。</li>\n<li><b>附件文档：</b>点按<b>导入 PDF、图片、Word 或音频</b>，每个视频最多可在应用内保存 <b>10 个文件</b>（每个最大 <b>100 MB</b> — 足以放下一整本书）。</li>\n<li>每个文档都有可编辑的<b>标题</b>，并带有<b>缩略图</b>（照片）或<b>彩色标识</b>（PDF、DOC、音频），一眼即可识别类型。</li>\n<li><b>眼睛</b>图标可直接打开 PDF 和图片；Word 文件会下载后用设备上的编辑器打开。如果某个 PDF 打不开，请换一个文档试试 — 有些文件本身已损坏。</li>\n<li><b>分享</b>按钮可通过 <b>WhatsApp</b>、电子邮件或设备上的其他应用发送文档。</li>\n<li>附件会包含在项目备份和报告中。</li>\n</ul>"},{"ic":"ti-palette","t":"主题","c":"<p>右上角的按钮在 5 种主题间切换 — 偏好会被保存：</p>\n<ol>\n<li><b>浅色</b> — 米色背景，赤陶红。</li>\n<li><b>深色</b> — OLED 纯黑配白色霓虹。</li>\n<li><b>普罗米修斯</b> — 青色科幻 HUD（应用的招牌）。</li>\n<li><b>普罗米修斯·红</b>和<b>普罗米修斯·蓝</b> — 两种变体。</li>\n</ol>"},{"ic":"ti-eye","t":"放大文字与缩放","c":"<p>如果您更喜欢较大的文字和按钮：</p>\n<ul>\n<li><b>☰ → 文字大小：</b>点按 <b>A+</b> 可放大整个应用的文字和按钮（最高 150%），点按 <b>A−</b> 恢复。选择会被保存。</li>\n<li><b>双指缩放：</b>在手机和平板上，也可以在任意屏幕上张开两根手指进行放大（捏合手势）。</li>\n</ul>"},{"ic":"ti-report","t":"报告与导出","c":"<ul>\n<li><b>年级报告：</b>年级卡片上的报告图标 → Word 或 PDF，包含课程、章节、视频、链接、备注、待办和文档。</li>\n<li><b>视频摘要：</b>在视频表单内 → Word 或 PDF，包含摘要文字、教学材料和附件。</li>\n<li>导出 PDF 时浏览器会打开打印对话框：选择<b>“另存为 PDF”</b>。</li>\n</ul>"},{"ic":"ti-shield","t":"备份与数据安全","c":"<p><b>保存是自动的。</b>你输入的一切都会在每次更改时自动保存到<b>此设备的浏览器</b>中——没有“保存”按钮，也不会上传到网络。但如果卸载应用或清除浏览器数据，数据将丢失。因此，若要<b>更换设备</b>或保留安全副本，请导出备份：</p>\n<ul>\n<li><b>导出：</b>☰ → 文件 → <b>导出备份 (.json)</b> — 生成包含整个项目（含附件）的文件。</li>\n<li><b>文件名：</b><code>prometeu-&lt;年份&gt;.json</code>（例如 <b>prometeu-2026.json</b>；若项目含机构名，会加入文件名）。这就是你带到其他设备的文件。</li>\n<li><b>保存位置：</b>设备的<b>下载文件夹</b>——<b>Windows</b> 为“下载/Downloads”；<b>Android</b> 为“Download”；<b>iPhone/iPad</b> 为<b>文件</b>应用 →“下载”。请复制到 Google 云端硬盘、邮箱或 U 盘以防丢失。</li>\n<li><b>导入：</b>☰ → 文件 → <b>导入备份 (.json)</b> — 在新设备上选择该文件即可重建整个项目。</li>\n<li>建议：每学期末以及更新应用前都导出一次。</li>\n</ul>"},{"ic":"ti-device-tablet","t":"在三星平板上（Galaxy Tab S）","c":"<p>应用已针对平板优化 — 全屏、One UI 的<b>分屏</b>和<b>弹窗视图</b>：</p>\n\n<ul>\n<li><b>在 Android 手机/平板上安装：</b>在 Chrome 中打开网站 → ⋮ 菜单 → <b>“安装应用”</b>（或“添加到主屏幕”）。应用将在独立窗口中打开，没有浏览器栏。</li>\n<li><b>在 iPhone/iPad 上安装：</b>用 <b>Safari</b> 打开网站 → <b>分享</b>按钮（带箭头的方块）→ <b>“添加到主屏幕”</b>。</li>\n<li><b>在电脑（Windows）上安装：</b>用 <b>Edge 或 Chrome</b> 打开网站，点击地址栏中的<b>安装图标</b>——应用会成为带开始菜单图标的程序。</li>\n<li><b>分屏：</b>点按<b>最近任务</b>，点按卡片顶部的<b>应用图标</b> → <b>“在分屏视图中打开”</b> → 选择第二个应用（如 YouTube）。</li>\n<li><b>弹窗视图：</b>在最近任务中点按应用图标 → <b>“在弹窗视图中打开”</b> — 应用变为悬浮在其他应用上的小窗口。</li>\n<li>布局会在任何窗口尺寸下自动调整。在“备注”栏中已停用手写笔的手写转文字功能（请使用键盘），以避免转换错误。</li>\n</ul>"},{"ic":"ti-help","t":"更新与版本","c":"<ul>\n<li><b>☰ → 帮助 → 更新：</b>说明每种版本（PWA 或单文件）的更新方式，并检查是否有新版本。</li>\n<li><b>☰ → 帮助 → 版本：</b>显示已安装的版本和数据概要。</li>\n</ul>"}]};
const UI={"nav1":["Recursos","Features","Recursos","功能"],"nav3":["Preço","Pricing","Precio","价格"],"nav4":["Instalar","Install","Instalar","安装"],"nav5":["Manual","Manual","Manual","手册"],"nav6":["Galeria","Gallery","Galería","图库"],"nav7":["Desenvolvedor","Developer","Desarrollador","开发者"],"nav8":["Tablet","Tablet","Tablet","平板"],"nav9":["Comprar","Buy","Comprar","购买"],"title":["Manual completo","Full manual","Manual completo","完整手册"],"back":["← Voltar ao site","← Back to site","← Volver al sitio","← 返回网站"],"lead":["Guia passo a passo do Organizador de Aulas — o mesmo tutorial que vem dentro do app, para você consultar antes de instalar. Toque em cada seção para abrir.","A step-by-step guide to the Lesson Organizer — the same tutorial that ships inside the app, so you can read it before installing. Tap each section to expand.","Guía paso a paso del Organizador de Clases — el mismo tutorial que viene dentro de la app, para leerlo antes de instalar. Toca cada sección para abrir.","《课程管理器》分步指南 —— 与应用内相同的教程，安装前即可查阅。点击各节展开。"],"extraH":["Em resumo, o que o app faz","In short, what the app does","En resumen, qué hace la app","应用功能一览"],"extra":["<ul>\n      <li><b>Organiza em 5 níveis:</b> Matéria → Série/Ano → Aula → Capítulo → Vídeo, do geral ao específico.</li>\n      <li><b>Controla o que já foi dado:</b> cada capítulo tem uma marcação de \"ministrado\"; o app soma as horas totais, as já ministradas e as que faltam, por série e por matéria.</li>\n      <li><b>Guarda tudo por vídeo:</b> link do YouTube (com nome e duração preenchidos ao colar), espaço para você escrever ou colar um resumo de até ~3 páginas, materiais citados e documentos anexados (PDF, imagem, Word ou áudio, até 100 MB cada).</li>\n      <li><b>Exporta relatórios</b> em Word e PDF — da série inteira ou do resumo de um vídeo.</li>\n      <li><b>Vários anos letivos</b> em projetos separados, com backup em arquivo <code>.json</code> para levar de um aparelho a outro.</li>\n      <li><b>100% offline e privado:</b> os dados ficam só no aparelho; nada é enviado para a internet. Salva sozinho a cada alteração.</li>\n      <li><b>Acessível:</b> 5 temas visuais, 4 idiomas e ajuste de tamanho do texto (até 150%).</li>\n    </ul>","<ul>\n      <li><b>Organizes in 5 levels:</b> Subject → Grade → Lesson → Chapter → Video, from broad to specific.</li>\n      <li><b>Tracks what you've taught:</b> each chapter has a \"taught\" mark; the app adds up total hours, hours taught and hours left, per grade and per subject.</li>\n      <li><b>Keeps everything per video:</b> YouTube link (name and length filled in on paste), space to write or paste your own summary of up to ~3 pages, cited materials and attached documents (PDF, image, Word or audio, up to 100 MB each).</li>\n      <li><b>Exports reports</b> in Word and PDF — the whole grade or a single video's summary.</li>\n      <li><b>Multiple school years</b> as separate projects, with a <code>.json</code> file backup to move between devices.</li>\n      <li><b>100% offline and private:</b> data stays only on the device; nothing is sent online. Saves itself on every change.</li>\n      <li><b>Accessible:</b> 5 visual themes, 4 languages and text size control (up to 150%).</li>\n    </ul>","<ul>\n      <li><b>Organiza en 5 niveles:</b> Materia → Curso/Año → Clase → Capítulo → Vídeo, de lo general a lo específico.</li>\n      <li><b>Controla lo ya impartido:</b> cada capítulo tiene una marca de \"impartido\"; la app suma las horas totales, las ya impartidas y las que faltan, por curso y por materia.</li>\n      <li><b>Guarda todo por vídeo:</b> enlace de YouTube (nombre y duración al pegar), espacio para escribir o pegar tu propio resumen de hasta ~3 páginas, materiales citados y documentos adjuntos (PDF, imagen, Word o audio, hasta 100 MB cada uno).</li>\n      <li><b>Exporta informes</b> en Word y PDF — del curso entero o del resumen de un vídeo.</li>\n      <li><b>Varios años escolares</b> en proyectos separados, con copia de seguridad e const LANGS=["pt","en","es","zh"];
const LANG_HTML={"pt":"pt-BR","en":"en","es":"es","zh":"zh-CN"};
const LKEY='prometeu.site.lang', TKEY='prometeu.site.theme';

function renderMan(l){
  const idx=LANGS.indexOf(l), secs=DATA[l]||DATA.pt;
  document.getElementById('man').innerHTML=secs.map((s,i)=>
    '<details class="sec"'+(i===0?' open':'')+'><summary><span class="n">'+(i+1)+'</span><span>'+
    s.t.replace(/&/g,'&amp;').replace(/</g,'&lt;')+'</span></summary><div class="body">'+s.c+'</div></details>'
  ).join('');
  document.getElementById('mTitle').textContent=UI.title[idx];
  document.getElementById('mLead').textContent=UI.lead[idx];
  document.getElementById('exH').textContent=UI.extraH[idx];
  document.getElementById('exBody').innerHTML=UI.extra[idx];
  document.querySelectorAll('nav [data-i]').forEach(el=>{const v=UI[el.dataset.i];if(v&&v[idx]!=null)el.textContent=v[idx];});
  document.documentElement.lang=LANG_HTML[l];
  document.querySelectorAll('#lang button').forEach(b=>b.classList.toggle('on',b.dataset.l===l));
  try{localStorage.setItem(LKEY,l);}catch(e){}
}
function setTheme(t){
  document.documentElement.className=t==='P'?'':'t-'+t;
  document.querySelectorAll('#themes .sw').forEach(b=>b.classList.toggle('on',b.dataset.t===t));
  try{localStorage.setItem(TKEY,t);}catch(e){}
}
document.querySelectorAll('#lang button').forEach(b=>b.onclick=()=>renderMan(b.dataset.l));
document.querySelectorAll('#themes .sw').forEach(b=>b.onclick=()=>setTheme(b.dataset.t));
(function(){
  let l='pt',t='P';
  try{l=localStorage.getItem(LKEY)||(/^zh/i.test(navigator.language)?'zh':/^es/i.test(navigator.language)?'es':/^en/i.test(navigator.language)?'en':'pt');}catch(e){}
  try{t=localStorage.getItem(TKEY)||'P';}catch(e){}
  if(!LANGS.includes(l))l='pt';
  setTheme(t); renderMan(l);
})();
</script>
</body>
